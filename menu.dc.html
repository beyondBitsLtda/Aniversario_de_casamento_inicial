<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseHeart {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  @keyframes softFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
</style>
</helmet>
<div style="min-height:100vh;width:100%;background:linear-gradient(180deg,#fff5f7 0%,#ffe4ec 60%,#ffd1de 100%);font-family:'Cormorant Garamond',serif;display:flex;justify-content:center;padding:0;box-sizing:border-box;">
  <div style="width:100%;max-width:440px;padding:32px 22px 60px;box-sizing:border-box;">

    <div style="text-align:center;animation:fadeInUp 0.9s ease-out both;">
      <div style="display:inline-block;font-size:28px;color:#c62348;animation:pulseHeart 1.4s ease-in-out infinite;">♥</div>
      <div style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#b83a5a;margin-top:6px;">Chez Alice</div>
      <h1 style="font-family:'Great Vibes',cursive;font-weight:400;font-size:44px;color:#c62348;margin:8px 0 4px;line-height:1.1;">
        Bem-vinda, senhora
      </h1>
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:#7a2a3d;margin:0 8px;line-height:1.5;">
        ao seu restaurante exclusivo.<br/>
        O que deseja jantar hoje?
      </p>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin:28px 4px 14px;animation:fadeInUp 1s ease-out 0.1s both;">
      <div style="flex:1;height:1px;background:linear-gradient(90deg,transparent,#c6234844);"></div>
      <div style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#c62348;">Prato Principal</div>
      <div style="flex:1;height:1px;background:linear-gradient(90deg,#c6234844,transparent);"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;animation:fadeInUp 1s ease-out 0.2s both;">
      <sc-for list="{{ mains }}" as="dish" hint-placeholder-count="3">
        <button onClick="{{ dish.onClick }}" style="display:flex;align-items:center;gap:16px;width:100%;padding:16px 18px;background:#fff;border:1px solid #ffd1de;border-radius:16px;box-shadow:0 6px 20px rgba(198,35,72,0.08);cursor:pointer;font-family:'Cormorant Garamond',serif;text-align:left;transition:all 0.25s ease;" style-hover="transform:translateY(-2px);box-shadow:0 12px 28px rgba(198,35,72,0.18);border-color:#c62348;" style-active="transform:translateY(0);">
          <div style="font-size:34px;line-height:1;flex-shrink:0;">{{ dish.emoji }}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:22px;font-weight:600;color:#c62348;line-height:1.1;">{{ dish.name }}</div>
            <div style="font-size:14px;font-style:italic;color:#7a2a3d;margin-top:2px;">{{ dish.desc }}</div>
          </div>
          <div style="font-size:18px;color:#c62348;">→</div>
        </button>
      </sc-for>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin:32px 4px 14px;animation:fadeInUp 1s ease-out 0.3s both;">
      <div style="flex:1;height:1px;background:linear-gradient(90deg,transparent,#c6234844);"></div>
      <div style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#c62348;">Sobremesas</div>
      <div style="flex:1;height:1px;background:linear-gradient(90deg,#c6234844,transparent);"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;animation:fadeInUp 1s ease-out 0.4s both;">
      <sc-for list="{{ desserts }}" as="d" hint-placeholder-count="3">
        <button onClick="{{ d.onClick }}" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 8px;background:#fff;border:1px solid #ffd1de;border-radius:14px;box-shadow:0 4px 14px rgba(198,35,72,0.08);cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all 0.25s ease;" style-hover="transform:translateY(-2px);border-color:#c62348;box-shadow:0 10px 22px rgba(198,35,72,0.18);">
          <div style="font-size:30px;line-height:1;">{{ d.emoji }}</div>
          <div style="font-size:15px;font-weight:600;color:#c62348;margin-top:8px;text-align:center;line-height:1.15;">{{ d.name }}</div>
        </button>
      </sc-for>
    </div>

    <div style="margin:36px 0 0;animation:fadeInUp 1s ease-out 0.5s both;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="flex:1;height:1px;background:linear-gradient(90deg,transparent,#c6234844);"></div>
        <div style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#c62348;">Um recadinho</div>
        <div style="flex:1;height:1px;background:linear-gradient(90deg,#c6234844,transparent);"></div>
      </div>

      <div style="background:#fff;border:1px solid #ffd1de;border-radius:18px;padding:20px;box-shadow:0 10px 28px rgba(198,35,72,0.10);">
        <label style="display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:#7a2a3d;line-height:1.4;margin-bottom:12px;">
          Deixe um elogio para o garçom<br/>
          <span style="font-size:13px;color:#b83a5a;">(no caso, seu marido maravilhoso ♥)</span>
        </label>
        <textarea value="{{ compliment }}" onInput="{{ onComplimentInput }}" rows="3" placeholder="Ex: você é o amor da minha vida..." style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #ffd1de;border-radius:12px;font-family:'Cormorant Garamond',serif;font-size:16px;color:#4a1a26;background:#fff8fa;resize:vertical;outline:none;transition:border-color 0.2s;" style-focus="border-color:#c62348;"></textarea>
        <button onClick="{{ sendCompliment }}" style="margin-top:12px;width:100%;padding:14px;background:linear-gradient(135deg,#dc2642,#c62348);color:#fff;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 8px 20px rgba(198,35,72,0.35);transition:transform 0.2s;" style-hover="transform:translateY(-2px);" style-active="transform:translateY(0);">
          Enviar com amor ♥
        </button>
      </div>
    </div>

    <div style="text-align:center;margin-top:40px;font-family:'Great Vibes',cursive;font-size:22px;color:#b83a5a;animation:softFloat 3s ease-in-out infinite;">
      ♥ &nbsp; feito com amor para você &nbsp; ♥
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    // ============================================================
    //  🔧 CONFIGURAÇÃO — troque aqui o número do WhatsApp (com DDI, só dígitos)
    //  Exemplo BR: "5511999999999"  (55 + DDD + número)
    // ============================================================
    this.PHONE_NUMBER = "5511999999999";
    // ============================================================

    this.state = { compliment: "" };
  }

  sendWhats = (msg) => {
    const url = `https://wa.me/${this.PHONE_NUMBER}?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
  };

  renderVals() {
    const pick = (name) => () =>
      this.sendWhats(`Olá, garçom! Hoje eu vou querer ${name} para o nosso jantar especial. ❤️`);

    const mains = [
      { emoji: "🍣", name: "Sushi",     desc: "combinado especial para dois", onClick: pick("Sushi") },
      { emoji: "🍔", name: "Hambúrguer", desc: "artesanal, do jeitinho que você ama", onClick: pick("Hambúrguer") },
      { emoji: "🍕", name: "Pizza",     desc: "quentinha, fatiada com carinho", onClick: pick("Pizza") },
    ];

    const desserts = [
      { emoji: "🍮", name: "Pudim",         onClick: () => this.sendWhats("De sobremesa, quero Pudim para adoçar a noite. ❤️") },
      { emoji: "🍨", name: "Sorvete",       onClick: () => this.sendWhats("De sobremesa, quero Sorvete para adoçar a noite. ❤️") },
      { emoji: "🍫", name: "Petit Gâteau",  onClick: () => this.sendWhats("De sobremesa, quero Petit Gâteau para adoçar a noite. ❤️") },
    ];

    return {
      mains,
      desserts,
      compliment: this.state.compliment,
      onComplimentInput: (e) => this.setState({ compliment: e.target.value }),
      sendCompliment: () => {
        const c = this.state.compliment.trim();
        if (!c) {
          this.sendWhats("Só passando aqui pra dizer que te amo, garçom lindo. ❤️");
        } else {
          this.sendWhats(`Um recadinho pro meu garçom favorito: "${c}" ❤️`);
        }
      },
    };
  }
}
</script>
</body>
</html>
